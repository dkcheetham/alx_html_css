<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Headphones - Contact Us</title>
  <link rel="stylesheet" href="3-styles.css">
  <!-- Link to the custom font icons -->
  <link rel="stylesheet" href="holberton_school-icon/holberton_school-icon.css">
</head>
<body>
  <!-- Contact Us Section -->
  <section class="contact-us">
    <div class="container">
      <h2 class="section-title">Contact us</h2>
      <form class="contact-form">
        <!-- Name Field -->
        <div class="form-group">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="Your name" required>
        </div>
        <!-- Email Field -->
        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Your email address" required>
        </div>
        <!-- Message Field -->
        <div class="form-group">
          <label for="message">Your message</label>
          <textarea id="message" name="message" placeholder="How can we help you?" rows="5" required></textarea>
        </div>
        <!-- Submit Button -->
        <button type="submit" class="submit-button">Call to Action</button>
      </form>
    </div>
  </section>
</body>
</html>
